name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # 의존성 + 프로젝트 editable 설치(+ dev 그룹 pytest·ruff). build-system 검증도 겸함.
      - name: Sync
        run: uv sync

      # 린트 — 미사용 import·죽은 코드 등(F 중심). 설정은 [tool.ruff].
      - name: Lint
        run: uv run ruff check .

      # 단위테스트 — API·네트워크·Neo4j 불필요(hermetic). 클린 러너라 PYTHONPATH 이슈 없음.
      - name: Test
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # 잠금 기반 설치 → 프로덕션 번들 빌드(프론트 깨짐 검출).
      - name: Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
