const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select("#g").attr("width",W).attr("height",H);
const root = svg.append("g");
svg.call(d3.zoom().on("zoom", e => root.attr("transform", e.transform)));

const link = root.append("g").attr("stroke","#444").attr("stroke-width",0.6)
  .selectAll("line").data(DATA.links).join("line");

const color = d => d.type==="paper" ? "#777" : (d.has_def ? "#4fc3f7" : "#ef5350");
const radius = d => d.type==="paper" ? 5 : 7;

const node = root.append("g").selectAll("g").data(DATA.nodes).join("g").call(
  d3.drag()
    .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

node.append("circle").attr("r",radius).attr("fill",color)
  .attr("stroke","#16161a").attr("stroke-width",1.5)
  .on("click",(e,d)=>showPanel(d));
node.append("text").text(d=>d.type==="method"?d.label:"").attr("x",9).attr("y",3);

const sim = d3.forceSimulation(DATA.nodes)
  .force("link", d3.forceLink(DATA.links).id(d=>d.id).distance(40))
  .force("charge", d3.forceManyBody().strength(-80))
  .force("center", d3.forceCenter(W/2, H/2))
  .on("tick", () => {
    link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
        .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    node.attr("transform",d=>`translate(${d.x},${d.y})`);
  });

function showPanel(d){
  const p = d3.select("#panel");
  if(d.type==="method"){
    p.html(`<h3>${d.label}</h3>
      <div class="${d.has_def?'':'muted'}">${d.has_def?d.definition:'정의없음 (코퍼스에 원전 없음)'}</div>
      <div class="muted" style="margin-top:10px">정의출처: ${d.def_source||'-'}</div>
      <div class="muted">등장 논문 ${d.papers.length}편: ${d.papers.join(', ')}</div>`);
  } else {
    p.html(`<h3>${d.label}</h3><div>${d.title}</div>`);
  }
}
</script></body></html>
