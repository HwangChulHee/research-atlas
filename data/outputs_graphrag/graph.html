<script>
const DATA={"nodes": [{"id": "rgb", "label": "RGB", "def_status": "n/a", "ptype": "benchmark", "has_def": false, "definition": "A bilingual benchmark for evaluating retrieval-augmented generation in large language models across four fundamental abilities: noise robustness, negative rejection, information integration, and counterfactual robustness.", "papers": ["2309.01431"], "domain": "general"}, {"id": "paper:2401.14887", "label": "The Power of Noise: Redefining Retrieval", "def_status": "n/a", "ptype": "analysis", "has_def": false, "definition": "Current RAG retrievers are assumed to surface the most relevant passages, but this paper shows that the type of retrieved documents can significantly affect LLM effectiveness and that standard retrieval assumptions may not hold in RAG settings.", "papers": ["2401.14887"], "domain": "general"}, {"id": "raft", "label": "RAFT", "def_status": "ok", "ptype": "technique", "has_def": true, "definition": "A training recipe that fine-tunes LLMs to answer questions using relevant retrieved documents while ignoring distractor documents and citing supporting text verbatim.", "papers": ["2403.10131"], "domain": "general"}, {"id": "graphrag", "label": "GraphRAG", "def_status": "ok", "ptype": "technique", "has_def": true, "definition": "A graph-based retrieval-augmented generation framework that enables global question answering over large private text corpora by organizing corpus content into a knowledge graph and community summaries.", "papers": ["2404.16130"], "domain": "general"}, {"id": "hipporag", "label": "HippoRAG", "def_status": "ok", "ptype": "technique", "has_def": true, "definition": "A retrieval framework that uses a knowledge graph and Personalized PageRank to enable efficient long-term memory and multi-hop knowledge integration for LLMs.", "papers": ["2405.14831"], "domain": "general"}, {"id": "ragbench", "label": "RAGBench", "def_status": "n/a", "ptype": "benchmark", "has_def": false, "definition": "A large-scale benchmark dataset for training and evaluating retrieval-augmented generation systems across multiple industry domains and task types.", "papers": ["2407.11005"], "domain": "general"}, {"id": "trace", "label": "TRACe", "def_status": "n/a", "ptype": "benchmark", "has_def": false, "definition": "An explainable and actionable RAG evaluation framework based on a suite of cross-domain metrics.", "papers": ["2407.11005"], "domain": "general"}, {"id": "rag taxonomy", "label": "RAG taxonomy", "def_status": "n/a", "ptype": "survey", "has_def": false, "definition": "A taxonomy that conceptualizes and categorizes the core characteristics of retrieval-augmented generation applications across domains.", "papers": ["2408.02854"], "domain": "general"}, {"id": "medgraphrag", "label": "MedGraphRAG", "def_status": "ok", "ptype": "technique", "has_def": true, "definition": "A graph-based retrieval-augmented generation framework for the medical domain that improves large language model responses with evidence-based retrieval and source-linked explanations.", "papers": ["2408.04187"], "domain": "medical"}, {"id": "paper:2408.08921", "label": "Graph Retrieval-Augmented Generation: A ", "def_status": "n/a", "ptype": "survey", "has_def": false, "definition": "Traditional RAG misses structured relationships, introduces redundant context, and lacks global information needed for more accurate and comprehensive generation.", "papers": ["2408.08921"], "domain": "general"}, {"id": "lightrag", "label": "LightRAG", "def_status": "ok", "ptype": "technique", "has_def": true, "definition": "A graph-empowered RAG framework that combines graph-based text indexing with dual-level retrieval to improve comprehensiveness, efficiency, and adaptability.", "papers": ["2410.05779"], "domain": "general"}, {"id": "medrag", "label": "MedRAG", "def_status": "ok", "ptype": "technique", "has_def": true, "definition": "A retrieval-augmented generation framework for medical diagnosis that combines knowledge graph-elicited reasoning with retrieved electronic health records to improve diagnostic accuracy and specificity.", "papers": ["2502.04413"], "domain": "medical"}, {"id": "amg rag", "label": "AMG-RAG", "def_status": "ok", "ptype": "technique", "has_def": true, "definition": "An agentic graph-RAG framework that automatically constructs and continuously updates medical knowledge graphs to support evidence-grounded medical QA.", "papers": ["2502.13010"], "domain": "medical"}, {"id": "hipporag 2", "label": "HippoRAG 2", "def_status": "ok", "ptype": "technique", "has_def": true, "definition": "A retrieval-augmented generation framework that improves non-parametric continual learning by combining Personalized PageRank with deeper passage integration and more effective online LLM use.", "papers": ["2502.14802"], "domain": "general"}, {"id": "hypergraphrag", "label": "HyperGraphRAG", "def_status": "ok", "ptype": "technique", "has_def": true, "definition": "A hypergraph-based RAG framework that represents and retrieves n-ary relational facts with hyperedges to improve knowledge-intensive generation.", "papers": ["2503.21322"], "domain": "general"}, {"id": "rag", "label": "RAG", "def_status": "placeholder", "ptype": "technique", "has_def": false, "definition": "", "papers": [], "domain": "general"}, {"id": "ircot", "label": "IRCoT", "def_status": "placeholder", "ptype": "technique", "has_def": false, "definition": "", "papers": [], "domain": "general"}, {"id": "raptor", "label": "RAPTOR", "def_status": "placeholder", "ptype": "technique", "has_def": false, "definition": "", "papers": [], "domain": "general"}], "links": [{"source": "rgb", "target": "rag", "kind": "builds_on", "from_type": "benchmark"}, {"source": "paper:2401.14887", "target": "rag", "kind": "builds_on", "from_type": "analysis"}, {"source": "raft", "target": "rag", "kind": "builds_on", "from_type": "technique"}, {"source": "graphrag", "target": "rag", "kind": "builds_on", "from_type": "technique"}, {"source": "hipporag", "target ", "sim": 0.567}, {"source": "graphrag", "target": "paper:2408.08921", "sim": 0.582}, {"source": "graphrag", "target": "lightrag", "sim": 0.647}, {"source": "graphrag", "target": "medrag", "sim": 0.479}, {"source": "graphrag", "target": "amg rag", "sim": 0.306}, {"source": "graphrag", "target": "hipporag 2", "sim": 0.6}, {"source": "graphrag", "target": "hypergraphrag", "sim": 0.6}, {"source": "hipporag", "target": "ragbench", "sim": 0.496}, {"source": "hipporag", "target": "trace", "sim": 0.496}, {"source": "hipporag", "target": "rag taxonomy", "sim": 0.441}, {"source": "hipporag", "target": "medgraphrag", "sim": 0.444}, {"source": "hipporag", "target": "paper:2408.08921", "sim": 0.538}, {"source": "hipporag", "target": "lightrag", "sim": 0.624}, {"source": "hipporag", "target": "medrag", "sim": 0.436}, {"source": "hipporag", "target": "amg rag", "sim": 0.306}, {"source": "hipporag", "target": "hipporag 2", "sim": 0.564}, {"source": "hipporag", "target": "hypergraphrag", "sim": 0.566}, {"source": "ragbench", "target": "rag taxonomy", "sim": 0.434}, {"source": "ragbench", "target": "medgraphrag", "sim": 0.599}, {"source": "ragbench", "target": "paper:2408.08921", "sim": 0.56}, {"source": "ragbench", "target": "lightrag", "sim": 0.59}, {"source": "ragbench", "target": "medrag", "sim": 0.598}, {"source": "ragbench", "target": "amg rag", "sim": 0.359}, {"source": "ragbench", "target": "hipporag 2", "sim": 0.463}, {"source": "ragbench", "target": "hypergraphrag", "sim": 0.496}, {"source": "trace", "target": "rag taxonomy", "sim": 0.434}, {"source": "trace", "target": "medgraphrag", "sim": 0.599}, {"source": "trace", "target": "paper:2408.08921", "sim": 0.56}, {"source": "trace", "target": "lightrag", "sim": 0.59}, {"source": "trace", "target": "medrag", "sim": 0.598}, {"source": "trace", "target": "amg rag", "sim": 0.359}, {"source": "trace", "target": "hipporag 2", "sim": 0.463}, {"source": "trace", "target": "hypergraphrag", "sim": 0.496}, {"source": "rag taxonomy", "target": "medgraphrag", "sim": 0.372}, {"source": "rag taxonomy", "target": "paper:2408.08921", "sim": 0.544}, {"source": "rag taxonomy", "target": "lightrag", "sim": 0.437}, {"source": "rag taxonomy", "target": "medrag", "sim": 0.383}, {"source": "rag taxonomy", "target": "amg rag", "sim": 0.318}, {"source": "rag taxonomy", "target": "hipporag 2", "sim": 0.448}, {"source": "rag taxonomy", "target": "hypergraphrag", "sim": 0.496}, {"source": "medgraphrag", "target": "paper:2408.08921", "sim": 0.559}, {"source": "medgraphrag", "target": "lightrag", "sim": 0.608}, {"source": "medgraphrag", "target": "medrag", "sim": 0.707}, {"source": "medgraphrag", "target": "amg rag", "sim": 0.513}, {"source": "medgraphrag", "target": "hipporag 2", "sim": 0.499}, {"source": "medgraphrag", "target": "hypergraphrag", "sim": 0.591}, {"source": "paper:2408.08921", "target": "lightrag", "sim": 0.726}, {"source": "paper:2408.08921", "target": "medrag", "sim": 0.515}, {"source": "paper:2408.08921", "target": "amg rag", "sim": 0.338}, {"source": "paper:2408.08921", "target": "hipporag 2", "sim": 0.59}, {"source": "paper:2408.08921", "target": "hypergraphrag", "sim": 0.661}, {"source": "lightrag", "target": "medrag", "sim": 0.627}, {"source": "lightrag", "target": "amg rag", "sim": 0.463}, {"source": "lightrag", "target": "hipporag 2", "sim": 0.585}, {"source": "lightrag", "target": "hypergraphrag", "sim": 0.672}, {"source": "medrag", "target": "amg rag", "sim": 0.533}, {"source": "medrag", "target": "hipporag 2", "sim": 0.433}, {"source": "medrag", "target": "hypergraphrag", "sim": 0.507}, {"source": "amg rag", "target": "hipporag 2", "sim": 0.37}, {"source": "amg rag", "target": "hypergraphrag", "sim": 0.414}, {"source": "hipporag 2", "target": "hypergraphrag", "sim": 0.586}]};const W=innerWidth,H=innerHeight;
const svg=d3.select("#g").attr("width",W).attr("height",H);
const root=svg.append("g");svg.call(d3.zoom().on("zoom",e=>root.attr("transform",e.transform)));
const TYPE_COLOR={technique:"#4fc3f7",benchmark:"#e0943a",analysis:"#b06fd6",survey:"#5cb96f",other:"#888"};
const fillColor=d=>d.def_status==="placeholder"?"#16161a":(TYPE_COLOR[d.ptype]||"#4fc3f7");
const strokeColor=d=>TYPE_COLOR[d.ptype]||"#4fc3f7";
const link=root.append("g").selectAll("line").data(DATA.links).join("line")
 .attr("stroke",d=>TYPE_COLOR[d.from_type]||"#888")
 .attr("stroke-width",1.8)
 .attr("stroke-opacity",0.65)
 .attr("marker-end",d=>"url(#arr-"+(d.from_type||"technique")+")");
const node=root.append("g").selectAll("g").data(DATA.nodes).join("g").call(
 d3.drag().on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
  .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;}).on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;
   if(SIM_STRENGTH>0)sim.alpha(0.4).restart();}));
node.append("circle").attr("r",10).attr("fill",fillColor).attr("stroke",strokeColor).attr("stroke-width",2.5)
 .on("click",(e,d)=>d3.select("#panel").html(
   `<h3>${d.label}</h3>`+
   `<div style="color:#aaa">type: ${d.ptype}${d.domain&&d.domain!=="general"?" · domain: "+d.domain:""}</div>`+
   `<div style="margin-top:6px">${d.definition||(d.def_status==="placeholder"?"정의없음 — 원논문 미수록":"—")}</div>`+
   `<div style="color:#888;margin-top:10px">등장 ${d.papers.length}편: ${d.papers.join(', ')}</div>`));
node.append("text").text(d=>d.label).attr("x",13).attr("y",4);
// problem 유사 인력: 슬라이더값 × 유사도로 당김
let SIM_STRENGTH=0;
const simPairs=(DATA.sim_pairs||[]).map(p=>({
  source:DATA.nodes.find(n=>n.id===p.source),
  target:DATA.nodes.find(n=>n.id===p.target),
  sim:p.sim
})).filter(p=>p.source&&p.target);
function problemForce(alpha){
  if(SIM_STRENGTH===0)return;
  for(const p of simPairs){
    const dx=p.target.x-p.source.x, dy=p.target.y-p.source.y;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    // 유사도가 높을수록, 슬라이더가 클수록 강하게 당김
    const k=SIM_STRENGTH*p.sim*p.sim*(alpha+0.15)*0.08;
    const fx=dx/dist*k, fy=dy/dist*k;
    p.source.vx+=fx; p.source.vy+=fy;
    p.target.vx-=fx; p.target.vy-=fy;
  }
}
const sim=d3.forceSimulation(DATA.nodes)
 .force("link",d3.forceLink(DATA.links).id(d=>d.id).distance(160).strength(0.3))
 .force("charge",d3.forceManyBody().strength(-900))
 .force("center",d3.forceCenter(W/2,H/2))
 .force("problem",problemForce)
 .on("tick",()=>{link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
   .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
   node.attr("transform",d=>`translate(${d.x},${d.y})`);});

  // 슬라이더 켜져 있으면 시뮬을 살짝 데운 채 유지 → 인력 지속
  sim.alphaTarget(SIM_STRENGTH>0?0.05:0).alpha(0.5).restart();
});
